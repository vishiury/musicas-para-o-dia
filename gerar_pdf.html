<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Repertório da Missa - PDF</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <script src="../animacao_titulo.js"></script>
    <script src="../planejador.js"></script>
    <link rel="stylesheet" href="../style.css">

    <link rel="apple-touch-icon" sizes="180x180" href="../imagens/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../imagens/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../imagens/favicon-16x16.png">
    <link rel="manifest" href="../imagens/site.webmanifest">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-7YP8E3T4RV"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-7YP8E3T4RV');
    </script>
    <style>
        :root {
            --cor-primaria: #d6c0ff;
            --cor-fundo: #1d044b;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f4f4f9;
            margin: 0; padding: 0; color: #333;
        }

        /* Área de Controlo (Não sai no PDF) */
        .no-print {
            background-color: var(--cor-fundo);
            padding: 15px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-acao {
            background-color: var(--cor-primaria);
            color: #1d044b;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .btn-acao:hover { background-color: white; transform: scale(1.05); }
        
        .btn-acao:disabled {
            background-color: #666;
            color: #ccc;
            cursor: not-allowed;
        }

        /* Aviso de "Nada Marcado" */
        .aviso-vazio {
            background: #fff3cd;
            color: #856404;
            padding: 15px;
            border-radius: 10px;
            margin: 20px auto;
            max-width: 600px;
            text-align: center;
            border: 1px solid #ffeeba;
        }

        /* Estrutura da Folha A4 */
        #conteudo-pdf {
            background: white;
            width: 210mm;
            min-height: 297mm;
            margin: 20px auto;
            padding: 20mm;
            box-sizing: border-box;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        header.pdf-header {
            text-align: center;
            border-bottom: 2px solid var(--cor-fundo);
            margin-bottom: 30px;
            padding-bottom: 10px;
        }

        .item-repertorio {
            margin-bottom: 30px;
            page-break-inside: avoid;
        }

        .item-repertorio h2 {
            font-size: 1.1rem;
            color: #1d044b;
            margin: 0 0 8px 0;
            text-transform: uppercase;
            border-left: 4px solid var(--cor-fundo);
            padding-left: 10px;
        }

        .info-musica {
            font-weight: bold;
            font-size: 1rem;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            background: #f9f9f9;
            padding: 5px 10px;
            border-radius: 5px;
        }

        .letra-musica {
            white-space: pre-wrap;
            line-height: 1.5;
            font-size: 0.95rem;
            color: #333;
            margin-left: 14px;
        }

        /* Responsividade para o ecrã */
        @media (max-width: 210mm) {
            #conteudo-pdf {
                width: 95%;
                padding: 10mm;
                margin: 10px auto;
            }
        }
    </style>
</head>
<body>

    <div class="no-print">
        <button class="btn-acao" onclick="window.history.back()">⬅ Voltar</button>
        <button id="btn-download" class="btn-acao" onclick="gerarPDF()">📥 Baixar PDF</button>
    </div>

    <div id="status-aviso"></div>

    <div id="conteudo-pdf">
        <header class="pdf-header">
            <h1 style="margin:0; color:#1d044b;">Repertório da Santa Missa</h1>
            <p id="data-atual" style="margin:5px 0; font-weight:bold;"></p>
        </header>

        <div id="lista-musicas">
            </div>
    </div>

    <script>
    function carregarRepertorio() {
    const listaContainer = document.getElementById('lista-musicas');
    const dados = JSON.parse(localStorage.getItem('meuRepertorioMissa') || '[]');
    
    listaContainer.innerHTML = "";

    const marcados = dados.filter(item => item.check && item.musica.trim() !== "");

    marcados.forEach(item => {
        const section = document.createElement('div');
        section.className = 'item-repertorio';
        
        // Melhora a formatação: se não tiver letra, avisa. Se tiver, troca as quebras de linha por <br>
        const textoLetra = item.letra && item.letra.trim() !== "" 
            ? item.letra.replace(/\n/g, '<br>') 
            : '<i style="color: #999;">Letra não selecionada ou não disponível.</i>';

        section.innerHTML = `
            <div style="margin-bottom: 35px; page-break-inside: avoid;">
                <h2 style="color: #1d044b; border-bottom: 2px solid #d6c0ff; margin-bottom: 8px;">${item.nomeMomento}</h2>
                <p><strong>Música:</strong> ${item.musica} | <strong>Tom:</strong> ${item.tom || '---'}</p>
                <div class="letra-musica" style="white-space: pre-wrap; line-height: 1.5; margin-top: 10px;">
                    ${textoLetra}
                </div>
            </div>
        `;
        listaContainer.appendChild(section);
    });

    document.getElementById('data-atual').textContent = new Date().toLocaleDateString('pt-BR', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });
}

    function gerarPDF() {
        const elemento = document.getElementById('conteudo-pdf');
        const opcoes = {
            margin: [10, 10, 10, 10],
            filename: 'Meu_Repertorio.pdf',
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opcoes).from(elemento).save();
    }

    window.onload = carregarRepertorio;
</script>
</body>
</html>
